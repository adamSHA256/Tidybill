name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  # Build standalone Go CLI binaries for all platforms
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-terminal-amd64
          - goos: windows
            goarch: amd64
            suffix: windows-terminal-amd64.exe
          - goos: darwin
            goarch: arm64
            suffix: mac-terminal-arm64
          - goos: darwin
            goarch: amd64
            suffix: mac-terminal-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w -X github.com/adamSHA256/tidybill/internal/config.Version=${{ github.ref_name }}" -o tidybill-${{ matrix.suffix }} ./cmd/tidybill/

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: tidybill-${{ matrix.suffix }}

  # Build Tauri desktop app per platform
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            tauri-args: "--bundles deb,rpm"
            ext: ""

          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            tauri-args: ""
            ext: ".exe"

          - os: macos-latest
            rust-target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            tauri-args: "--target aarch64-apple-darwin"
            ext: ""

          - os: macos-latest
            rust-target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            tauri-args: "--target x86_64-apple-darwin"
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build Go sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          go build -ldflags="-s -w -X github.com/adamSHA256/tidybill/internal/config.Version=${{ github.ref_name }}" \
            -o "desktop/src-tauri/binaries/tidybill-${{ matrix.rust-target }}${{ matrix.ext }}" ./cmd/tidybill/

      - name: Set version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" desktop/src-tauri/tauri.conf.json
          echo "Set Tauri version to ${VERSION}"

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri-args }}
          tagName: ${{ github.ref_name }}
          releaseName: "TidyBill ${{ github.ref_name }}"
          releaseBody: "Release is being built..."
          releaseDraft: true
          prerelease: false

  # Build Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.1.12297006"

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest

      - name: Build Go shared library (AAR)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: |
          mkdir -p desktop/src-tauri/gen/android/app/libs
          gomobile bind -v \
            -o desktop/src-tauri/gen/android/app/libs/tidybill.aar \
            -target=android/arm64 -androidapi 24 \
            ./pkg/mobile

      - name: Set version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" desktop/src-tauri/tauri.conf.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Android APK
        working-directory: desktop
        run: pnpm tauri android build --apk --target aarch64

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
          APK_PATH="desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            "$APK_PATH"
          rm /tmp/release.keystore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

  # Rename release assets and set release body
  rename-assets:
    needs: [build-cli, build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RELEASE_ID=$(gh api "repos/${REPO}/releases" --jq ".[] | select(.tag_name==\"${TAG}\") | .id")

          # Rename APK
          mv android-apk/app-universal-release-unsigned.apk android-apk/TidyBill_Android_arm64.apk

          # Delete existing asset if present
          existing_id=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" \
            --jq '.[] | select(.name=="TidyBill_Android_arm64.apk") | .id' 2>/dev/null || true)
          if [ -n "$existing_id" ]; then
            gh api "repos/${REPO}/releases/assets/${existing_id}" -X DELETE --silent
          fi

          UPLOAD_URL="https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets"
          gh api "${UPLOAD_URL}?name=TidyBill_Android_arm64.apk" \
            -X POST -H "Content-Type: application/octet-stream" \
            --input android-apk/TidyBill_Android_arm64.apk --silent

      - name: Rename assets and update release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          # Find release (including drafts) by tag name
          RELEASE_ID=$(gh api "repos/${REPO}/releases" --jq ".[] | select(.tag_name==\"${TAG}\") | .id")
          echo "Release ID: ${RELEASE_ID}"

          # Get all release assets
          ASSETS=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id) \(.name)"')

          rename_asset() {
            local old_name="$1"
            local new_name="$2"
            local asset_id
            asset_id=$(echo "$ASSETS" | grep " ${old_name}$" | awk '{print $1}')
            if [ -n "$asset_id" ]; then
              echo "Renaming: ${old_name} -> ${new_name}"
              gh api "repos/${REPO}/releases/assets/${asset_id}" \
                -X PATCH -f name="${new_name}" --silent
            else
              echo "Asset not found: ${old_name}"
            fi
          }

          # Desktop apps
          rename_asset "TidyBill_${VERSION}_x64-setup.exe"      "TidyBill_Windows_Desktop_x64_setup.exe"
          rename_asset "TidyBill_${VERSION}_x64-setup.exe.sig"   "TidyBill_Windows_Desktop_x64_setup.exe.sig"
          rename_asset "TidyBill_${VERSION}_amd64.deb"           "TidyBill_Linux_Desktop_amd64.deb"
          rename_asset "TidyBill-${VERSION}-1.x86_64.rpm"        "TidyBill_Linux_Desktop_x86_64.rpm"
          rename_asset "TidyBill_${VERSION}_aarch64.dmg"         "TidyBill_Mac_Desktop_aarch64.dmg"
          rename_asset "TidyBill_${VERSION}_x64.dmg"             "TidyBill_Mac_Desktop_x64.dmg"

          # Signature files for updater (if present)
          rename_asset "TidyBill_${VERSION}_aarch64.dmg.sig"     "TidyBill_Mac_Desktop_aarch64.dmg.sig"
          rename_asset "TidyBill_${VERSION}_x64.dmg.sig"         "TidyBill_Mac_Desktop_x64.dmg.sig"
          rename_asset "TidyBill-${VERSION}-1.x86_64.rpm.sig"    "TidyBill_Linux_Desktop_x86_64.rpm.sig"

          # Update release body with download table
          DOWNLOAD_BASE="https://github.com/${REPO}/releases/download/${TAG}"
          gh api "repos/${REPO}/releases/${RELEASE_ID}" -X PATCH -f body="$(cat <<EOF
          # Download for Windows

          ### [>>> Click here to download TidyBill for Windows <<<](${DOWNLOAD_BASE}/TidyBill_Windows_Desktop_x64_setup.exe)

          Double-click the downloaded file to install. Windows may show a security warning — this is normal for apps that aren't code-signed yet:

          1. Click **"More info"**
          2. Click **"Run anyway"**

          <img src="https://raw.githubusercontent.com/${REPO}/main/.github/smart-screen.png" alt="SmartScreen warning" width="400">

          ---

          # Download for Android

          ### [>>> Download TidyBill for Android <<<](${DOWNLOAD_BASE}/TidyBill_Android_arm64.apk)

          Enable "Install from unknown sources" in your phone settings, then open the downloaded APK to install.

          ---

          # Download for Linux, macOS & CLI version
          <details> <summary>Open here</summary>

          ### Desktop App (GUI)

          | Platform | File | Notes |
          |----------|------|-------|
          | **Linux (Debian/Ubuntu)** | [TidyBill_Linux_Desktop_amd64.deb](${DOWNLOAD_BASE}/TidyBill_Linux_Desktop_amd64.deb) | \`sudo dpkg -i TidyBill_Linux_Desktop_amd64.deb\` |
          | **Linux (Fedora/RHEL)** | [TidyBill_Linux_Desktop_x86_64.rpm](${DOWNLOAD_BASE}/TidyBill_Linux_Desktop_x86_64.rpm) | \`sudo rpm -i TidyBill_Linux_Desktop_x86_64.rpm\` |
          | **macOS (Apple Silicon)** | [TidyBill_Mac_Desktop_aarch64.dmg](${DOWNLOAD_BASE}/TidyBill_Mac_Desktop_aarch64.dmg) | For M1/M2/M3/M4 Macs. Gatekeeper may warn — open System Settings → Privacy & Security → click "Open Anyway" |
          | **macOS (Intel)** | [TidyBill_Mac_Desktop_x64.dmg](${DOWNLOAD_BASE}/TidyBill_Mac_Desktop_x64.dmg) | For older Intel Macs. Gatekeeper may warn — open System Settings → Privacy & Security → click "Open Anyway" |

          ### CLI (terminal only, no GUI)

          | Platform | File |
          |----------|------|
          | **Linux** | [tidybill-linux-terminal-amd64](${DOWNLOAD_BASE}/tidybill-linux-terminal-amd64) |
          | **Windows** | [tidybill-windows-terminal-amd64.exe](${DOWNLOAD_BASE}/tidybill-windows-terminal-amd64.exe) |
          | **macOS (Apple Silicon)** | [tidybill-mac-terminal-arm64](${DOWNLOAD_BASE}/tidybill-mac-terminal-arm64) |
          | **macOS (Intel)** | [tidybill-mac-terminal-amd64](${DOWNLOAD_BASE}/tidybill-mac-terminal-amd64) |

          </details>

          ## What's new

          See [README](https://github.com/${REPO}#readme) for features and screenshots.
          EOF
          )" --silent

  # Attach standalone CLI binaries to the release
  upload-cli:
    needs: [build-cli, build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: cli-binaries

      - name: Upload CLI binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Find release (including drafts) by tag name
          RELEASE_ID=$(gh api "repos/${REPO}/releases" --jq ".[] | select(.tag_name==\"${TAG}\") | .id")
          echo "Release ID: ${RELEASE_ID}"

          UPLOAD_URL="https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets"

          for file in cli-binaries/*; do
            filename=$(basename "$file")
            echo "Uploading ${filename} ..."

            # Delete existing asset with same name if present (--clobber equivalent)
            existing_id=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" \
              --jq ".[] | select(.name==\"${filename}\") | .id" 2>/dev/null || true)
            if [ -n "$existing_id" ]; then
              echo "Deleting existing asset ${filename} (id: ${existing_id})"
              gh api "repos/${REPO}/releases/assets/${existing_id}" -X DELETE --silent
            fi

            gh api "${UPLOAD_URL}?name=${filename}" \
              -X POST \
              -H "Content-Type: application/octet-stream" \
              --input "$file" --silent
          done
