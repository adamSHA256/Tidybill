name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  # Build standalone Go CLI binaries for all platforms
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-terminal-amd64
          - goos: windows
            goarch: amd64
            suffix: windows-terminal-amd64.exe
          - goos: darwin
            goarch: arm64
            suffix: mac-terminal-arm64
          - goos: darwin
            goarch: amd64
            suffix: mac-terminal-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w -X github.com/adamSHA256/tidybill/internal/config.Version=${{ github.ref_name }}" -o tidybill-${{ matrix.suffix }} ./cmd/tidybill/

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: tidybill-${{ matrix.suffix }}

  # Build Tauri desktop app per platform
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            tauri-args: ""
            ext: ""

          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            tauri-args: ""
            ext: ".exe"

          - os: macos-latest
            rust-target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            tauri-args: "--target aarch64-apple-darwin"
            ext: ""

          - os: macos-latest
            rust-target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            tauri-args: "--target x86_64-apple-darwin"
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build Go sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          go build -ldflags="-s -w -X github.com/adamSHA256/tidybill/internal/config.Version=${{ github.ref_name }}" \
            -o "desktop/src-tauri/binaries/tidybill-${{ matrix.rust-target }}${{ matrix.ext }}" ./cmd/tidybill/

      - name: Set version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" desktop/src-tauri/tauri.conf.json
          echo "Set Tauri version to ${VERSION}"

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri-args }}
          tagName: ${{ github.ref_name }}
          releaseName: "TidyBill ${{ github.ref_name }}"
          releaseBody: "Release is being built..."
          releaseDraft: true
          prerelease: false

      - name: Fix AppImage GPU library conflicts
        if: runner.os == 'Linux'
        run: |
          cd desktop/src-tauri/target/release/bundle/appimage
          APPIMAGE=$(ls *.AppImage)
          chmod +x "$APPIMAGE"
          "./$APPIMAGE" --appimage-extract

          # Remove bundled GPU/EGL libs that conflict with host drivers
          rm -f squashfs-root/usr/lib/libEGL* \
                squashfs-root/usr/lib/libGL* \
                squashfs-root/usr/lib/libgbm* \
                squashfs-root/usr/lib/libdrm* \
                squashfs-root/usr/lib/libGLX* \
                squashfs-root/usr/lib/libGLdispatch* \
                squashfs-root/usr/lib/libOpenGL*
          rm -rf squashfs-root/usr/lib/dri

          # Repack
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"

          # Re-upload to release (overwrite the original)
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" \
            --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Rename release assets and set release body
  rename-assets:
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Rename assets and update release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          # Find release (including drafts) by tag name
          RELEASE_ID=$(gh api "repos/${REPO}/releases" --jq ".[] | select(.tag_name==\"${TAG}\") | .id")
          echo "Release ID: ${RELEASE_ID}"

          # Get all release assets
          ASSETS=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id) \(.name)"')

          rename_asset() {
            local old_name="$1"
            local new_name="$2"
            local asset_id
            asset_id=$(echo "$ASSETS" | grep " ${old_name}$" | awk '{print $1}')
            if [ -n "$asset_id" ]; then
              echo "Renaming: ${old_name} -> ${new_name}"
              gh api "repos/${REPO}/releases/assets/${asset_id}" \
                -X PATCH -f name="${new_name}" --silent
            else
              echo "Asset not found: ${old_name}"
            fi
          }

          # Desktop apps
          rename_asset "TidyBill_${VERSION}_x64-setup.exe"      "TidyBill_Windows_Desktop_${VERSION}_x64_setup.exe"
          rename_asset "TidyBill_${VERSION}_x64-setup.exe.sig"   "TidyBill_Windows_Desktop_${VERSION}_x64_setup.exe.sig"
          rename_asset "TidyBill_${VERSION}_amd64.AppImage"      "TidyBill_Linux_Desktop_${VERSION}_amd64.AppImage"
          rename_asset "TidyBill_${VERSION}_amd64.deb"           "TidyBill_Linux_Desktop_${VERSION}_amd64.deb"
          rename_asset "TidyBill-${VERSION}-1.x86_64.rpm"        "TidyBill_Linux_Desktop_${VERSION}_x86_64.rpm"
          rename_asset "TidyBill_${VERSION}_aarch64.dmg"         "TidyBill_Mac_Desktop_${VERSION}_aarch64.dmg"
          rename_asset "TidyBill_${VERSION}_x64.dmg"             "TidyBill_Mac_Desktop_${VERSION}_x64.dmg"

          # Signature files for updater (if present)
          rename_asset "TidyBill_${VERSION}_amd64.AppImage.sig"  "TidyBill_Linux_Desktop_${VERSION}_amd64.AppImage.sig"
          rename_asset "TidyBill_${VERSION}_aarch64.dmg.sig"     "TidyBill_Mac_Desktop_${VERSION}_aarch64.dmg.sig"
          rename_asset "TidyBill_${VERSION}_x64.dmg.sig"         "TidyBill_Mac_Desktop_${VERSION}_x64.dmg.sig"
          rename_asset "TidyBill-${VERSION}-1.x86_64.rpm.sig"    "TidyBill_Linux_Desktop_${VERSION}_x86_64.rpm.sig"

          # Update release body with download table
          gh api "repos/${REPO}/releases/${RELEASE_ID}" -X PATCH -f body="$(cat <<EOF
          # Download

          > **Not sure which to pick?** If you want a graphical app with buttons and menus, download the **Desktop App**. If you prefer working in a terminal, download the **CLI**.

          ### Desktop App (GUI)

          | Platform | File | Notes |
          |----------|------|-------|
          | **Windows** | \`TidyBill_Windows_Desktop_${VERSION}_x64_setup.exe\` | Double-click to install. SmartScreen may warn — click "More info" → "Run anyway" |
          | **Linux** | \`TidyBill_Linux_Desktop_${VERSION}_amd64.AppImage\` | \`chmod +x\` and run. Works on any distro |
          | **Linux (Debian/Ubuntu)** | \`TidyBill_Linux_Desktop_${VERSION}_amd64.deb\` | \`sudo dpkg -i TidyBill_Linux_Desktop_${VERSION}_amd64.deb\` |
          | **Linux (Fedora/RHEL)** | \`TidyBill_Linux_Desktop_${VERSION}_x86_64.rpm\` | \`sudo rpm -i TidyBill_Linux_Desktop_${VERSION}_x86_64.rpm\` |
          | **macOS (Apple Silicon)** | \`TidyBill_Mac_Desktop_${VERSION}_aarch64.dmg\` | For M1/M2/M3/M4 Macs |
          | **macOS (Intel)** | \`TidyBill_Mac_Desktop_${VERSION}_x64.dmg\` | For older Intel Macs |

          ### CLI (terminal only, no GUI)

          | Platform | File |
          |----------|------|
          | **Linux** | \`tidybill-linux-terminal-amd64\` |
          | **Windows** | \`tidybill-windows-terminal-amd64.exe\` |
          | **macOS (Apple Silicon)** | \`tidybill-mac-terminal-arm64\` |
          | **macOS (Intel)** | \`tidybill-mac-terminal-amd64\` |

          ## What's new

          See [README](https://github.com/adamSHA256/Tidybill#readme) for features and screenshots.
          EOF
          )" --silent

  # Attach standalone CLI binaries to the release
  upload-cli:
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: cli-binaries

      - name: Upload CLI binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for file in cli-binaries/*; do
            echo "Uploading $file ..."
            gh release upload "$TAG" "$file" --repo "${{ github.repository }}" --clobber
          done
