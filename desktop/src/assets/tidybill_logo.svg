          fill="#1B2B3A" />
    <!-- Lines on receipt -->
    <line x1="12" y1="22" x2="48" y2="22" stroke="#4A9E8E" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="36" x2="40" y2="36" stroke="#4A9E8E" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="50" x2="44" y2="50" stroke="#4A9E8E" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    <!-- Checkmark circle -->
